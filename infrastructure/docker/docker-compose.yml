# OrbitFlow Docker Compose
# Backend-first development environment: PostgreSQL, Redis, API, and NGINX API gateway.

services:
  postgres:
    image: postgres:16-alpine
    container_name: orbitflow-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orbitflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orbitflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/api/Dockerfile
    container_name: orbitflow-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orbitflow?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: dev-refresh-secret-minimum-32-chars-long
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: orbitflow-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
